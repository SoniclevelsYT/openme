<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencia de Video</title>
    <style>
        /* Eliminamos márgenes para que el video toque los bordes */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            background-color: #000; 
            overflow: hidden; 
        }

        /* Capa inicial con el botón */
        #capa-inicio {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #000; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            z-index: 100;
            color: white; 
            font-family: sans-serif;
        }

        #btn-verde {
            padding: 20px 40px; 
            font-size: 20px;
            background-color: green; 
            color: white;
            border: none; 
            cursor: pointer; 
            border-radius: 10px;
        }

        /* El video configurado para pantalla completa */
        #video-principal {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            /* 'cover' hará que el video llene toda la pantalla una vez lo recortes */
            object-fit: cover; 
            display: none; 
        }
    </style>
</head>
<body>

    <div id="capa-inicio">
        <h1>Por favor, pulsa el botón verde</h1>
        <button id="btn-verde" onclick="iniciarExperiencia()">Reproducir</button>
    </div>

    <video id="video-principal" loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        function iniciarExperiencia() {
            var capa = document.getElementById("capa-inicio");
            var video = document.getElementById("video-principal");
            
            // Ocultamos el botón y mostramos el video
            capa.style.display = "none";
            video.style.display = "block";
            
            // Activamos sonido y reproducimos
            video.muted = false;
            video.play();
        }
    </script>
</body>
</html>
