<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Video</title>
    <style>
      
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            overflow: hidden; 
        }
   
        video { 
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%; 
            min-height: 100%;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

</body>
</html>
