<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Video</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
        }
        
        /* Capa de inicio */
        #capa-inicio {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            font-family: sans-serif;
        }

        #btn-verde {
            padding: 20px 40px;
            font-size: 20px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* Contenedor del video */
        #contenedor-video {
            display: none;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            /* 'contain' asegura que se vea todo el video sin recortes */
            object-fit: contain; 
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="capa-inicio">
        <h1>Por favor, pulsa el botón verde</h1>
        <button id="btn-verde" onclick="iniciarExperiencia()">Reproducir</button>
    </div>

    <div id="contenedor-video">
        <video id="video-principal" loop playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        function iniciarExperiencia() {
            var contenedor = document.getElementById("contenedor-video");
            var capa = document.getElementById("capa-inicio");
            var video = document.getElementById("video-principal");
            
            capa.style.display = "none";
            contenedor.style.display = "block";
            
            video.muted = false;
            video.play();
        }
    </script>
</body>
</html>
